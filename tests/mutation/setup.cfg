# =============================================================================
# Mutation Testing Configuration for the Marvel Characters project
# =============================================================================
#
# Mutation testing checks whether your TESTS are strong enough by deliberately
# introducing bugs ("mutants") into your SOURCE CODE and checking whether your
# tests catch them.
#
#   Mutant KILLED   = a test failed when the bug was introduced   (GOOD - your tests work)
#   Mutant SURVIVED = all tests still passed despite the bug      (BAD  - a test gap)
#
# Mutation score = killed / (killed + survived)
#   > 80%  = strong test suite
#   60-80% = acceptable, some gaps
#   < 60%  = weak test suite, tests are not catching real bugs
#
# -----------------------------------------------------------------------------
# This file configures `mutmut`, the mutation testing tool.
# Install it with:   pip install mutmut
# Run it with:       mutmut run        (or use run_mutation_tests.py)
# View results with: mutmut results
# -----------------------------------------------------------------------------

[mutmut]
# Which source files to mutate (introduce bugs into).
# We mutate the pure-logic modules that have fast unit tests.
# We deliberately DO NOT mutate modules that require Spark/Databricks/MLflow
# (data_processor's Spark calls, basic_model's training) because their tests
# are slow integration tests, which would make a mutation run take hours.
paths_to_mutate=src/marvel_characters/utils.py,src/marvel_characters/config.py,src/marvel_characters/models/custom_model.py

# The command mutmut runs to check whether a mutant is killed.
# We point it at the fast unit tests only -- mutation testing re-runs the
# test suite once PER mutant, so the suite must be fast (no network, no Spark).
runner=python -m pytest tests/unit/ -x -q --no-header --no-cov

# Where the test files live (helps mutmut decide what to re-run).
tests_dir=tests/unit/

# Use coverage data to skip mutating lines that no test exercises.
# (A line with zero coverage can never be killed, so mutating it is wasted time.)
# Generate coverage first with:  pytest tests/unit/ --cov=src --cov-report=xml
use_coverage=True
