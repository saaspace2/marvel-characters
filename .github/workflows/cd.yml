name: CD
on:
  workflow_dispatch:
  push:
    branches:
        - 'main'
jobs:
  deploy-acc:
    runs-on: ubuntu-latest
    environment: acc
    permissions:
      contents: write
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Install Databricks CLI
        uses: databricks/setup-cli@49580195afe1ccb06d195764a1d0ae9fabfe2edd #v0.246.0
        with:
          version: 0.296.1
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << EOF
          [marvelous]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOF
      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 #v5.4.1
      - name: Deploy Bundle to Databricks
        env:
          DATABRICKS_BUNDLE_ENV: acc
        run: |
          databricks bundle deploy \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Run Workflow on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: acc
        run: |
          databricks bundle run deployment \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Wait for ACC serving endpoint to finish updating
        env:
          DATABRICKS_BUNDLE_ENV: acc
          ENDPOINT_NAME: marvel-character-model-serving
        run: |
          echo "Polling serving endpoint '$ENDPOINT_NAME' until it is fully ready..."
          max_attempts=60
          sleep_seconds=30
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            status=$(databricks serving-endpoints get "$ENDPOINT_NAME" -o json | python3 -c "import sys, json; print(json.load(sys.stdin)['state']['config_update'])")
            echo "Attempt $attempt/$max_attempts -> config_update: $status"

            if [ "$status" = "NOT_UPDATING" ]; then
              echo "Endpoint is ready, serving the new version."
              exit 0
            fi

            if [ "$status" = "UPDATE_FAILED" ]; then
              echo "Endpoint update failed. Aborting before promoting to prod."
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep $sleep_seconds
          done

          echo "Timed out after $((max_attempts * sleep_seconds / 60)) minutes waiting for endpoint to become ready."
          exit 1

  deploy-prd:
    runs-on: ubuntu-latest
    needs: deploy-acc
    environment: prd
    permissions:
      contents: write
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Install Databricks CLI
        uses: databricks/setup-cli@49580195afe1ccb06d195764a1d0ae9fabfe2edd #v0.246.0
        with:
          version: 0.296.1
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << EOF
          [marvelous]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOF
      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 #v5.4.1
      - name: Deploy Bundle to Databricks
        env:
          DATABRICKS_BUNDLE_ENV: prd
        run: |
          databricks bundle deploy \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Run Workflow on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: prd
        run: |
          databricks bundle run deployment \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Tag version (prd only)
        run: |
          echo "VERSION=$(cat version.txt)"
          git tag $VERSION
          git push origin $VERSION
