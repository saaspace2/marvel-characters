name: CD
on:
  workflow_dispatch:
  push:
    branches:
        - 'main'
jobs:
  deploy-acc:
    runs-on: ubuntu-latest
    environment: acc
    permissions:
      contents: write
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Install Databricks CLI
        uses: databricks/setup-cli@49580195afe1ccb06d195764a1d0ae9fabfe2edd #v0.246.0
        with:
          version: 0.296.1
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << EOF
          [marvelous]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOF
      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 #v5.4.1
      - name: Deploy Bundle to Databricks
        env:
          DATABRICKS_BUNDLE_ENV: acc
        run: |
          databricks bundle deploy \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Run Workflow on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: acc
        run: |
          databricks bundle run deployment \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Wait for ACC serving endpoint to finish updating
        env:
          DATABRICKS_BUNDLE_ENV: acc
          ENDPOINT_NAME: marvel-character-model-serving
        run: |
          echo "Polling serving endpoint '$ENDPOINT_NAME' until it is fully ready..."
          max_attempts=60
          sleep_seconds=30
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            status=$(databricks serving-endpoints get "$ENDPOINT_NAME" -o json | python3 -c "import sys, json; print(json.load(sys.stdin)['state']['config_update'])")
            echo "Attempt $attempt/$max_attempts -> config_update: $status"

            if [ "$status" = "NOT_UPDATING" ]; then
              echo "Endpoint is ready, serving the new version."
              exit 0
            fi

            if [ "$status" = "UPDATE_FAILED" ]; then
              echo "Endpoint update failed. Aborting before promoting to prod."
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep $sleep_seconds
          done

          echo "Timed out after $((max_attempts * sleep_seconds / 60)) minutes waiting for endpoint to become ready."
          exit 1

      # ====================================================================
      # POST-DEPLOY TESTS AGAINST THE LIVE ACC ENDPOINT
      # The endpoint is confirmed ready above, so now we test it for real.
      # Order matters: smoke is the GATE. If smoke fails, everything stops
      # and we never promote a broken model toward production.
      # ====================================================================
      - name: Install test dependencies
        run: |
          uv sync --extra test

      - name: Set endpoint environment variables (ACC)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail
          HOST="${DATABRICKS_HOST%/}"

          if [ -z "${DATABRICKS_TOKEN:-}" ]; then
            echo "DATABRICKS_TOKEN secret is empty. Add it to the 'acc' environment"
            echo "(Settings > Environments > acc > Add secret)."
            exit 1
          fi

          # Mask the token so it never appears in logs, then export for later steps.
          echo "::add-mask::$DATABRICKS_TOKEN"
          echo "ENDPOINT_URL=${HOST}/serving-endpoints/marvel-character-model-serving/invocations" >> $GITHUB_ENV
          echo "DBR_TOKEN=$DATABRICKS_TOKEN" >> $GITHUB_ENV
          echo "DBR_TOKEN set from secret (length: ${#DATABRICKS_TOKEN})."

      - name: Smoke tests (GATE - is the live model even alive?)
        run: |
          uv run pytest tests/smoke/ -v --no-cov

      - name: Serving endpoint tests (is it correct, fast, robust?)
        run: |
          uv run pytest tests/ServingEndpoint/ -v --no-cov

      - name: Contract tests (is the API still keeping its promise?)
        run: |
          uv run pytest tests/contract/ -v --no-cov

      - name: Snapshot tests (did the response shape change?)
        # Allowed to fail the first time before a snapshot exists; afterwards
        # a real shape change should block promotion. Commit api_snapshot.json
        # to the repo once captured so this becomes a hard gate.
        run: |
          uv run pytest tests/snapshot/ -v --no-cov

      - name: Fuzz tests (do crazy inputs crash it? They must not.)
        run: |
          uv run pytest tests/fuzz/ -v --no-cov

      - name: Property-based tests (do the always-true rules hold?)
        run: |
          uv run pytest tests/property_based/ -v --no-cov

      - name: Performance tests (fast enough under load?)
        run: |
          uv run pytest tests/performance/ -v -m "not slow" --no-cov

      - name: Monitoring & drift tests (data/prediction drift check)
        run: |
          uv run pytest tests/monitoring_and_drift/ -v --no-cov

      - name: Regression tests (did we break a previously-correct answer?)
        # Requires golden_outputs.json committed to the repo. If absent, this
        # skips cleanly. Capture it once with --update-golden against an
        # approved model and commit it to turn this into a hard gate.
        run: |
          uv run pytest tests/regression/ -v --no-cov

  deploy-prd:
    runs-on: ubuntu-latest
    needs: deploy-acc
    environment: prd
    permissions:
      contents: write
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
      - name: Install Databricks CLI
        uses: databricks/setup-cli@49580195afe1ccb06d195764a1d0ae9fabfe2edd #v0.246.0
        with:
          version: 0.296.1
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << EOF
          [marvelous]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOF
      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 #v5.4.1
      - name: Deploy Bundle to Databricks
        env:
          DATABRICKS_BUNDLE_ENV: prd
        run: |
          databricks bundle deploy \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"
      - name: Run Workflow on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: prd
        run: |
          databricks bundle run deployment \
            --var="git_sha=${{ github.sha }}" \
            --var="branch=${{ github.ref_name }}"

      # ====================================================================
      # POST-DEPLOY SANITY TESTS AGAINST THE LIVE PROD ENDPOINT
      # Lighter than ACC: confirm prod is alive and answers correctly. We do
      # NOT run heavy/destructive suites (fuzz, chaos, load) against prod.
      # ====================================================================
      - name: Wait for PRD serving endpoint to finish updating
        env:
          ENDPOINT_NAME: marvel-character-model-serving
        run: |
          echo "Polling PRD serving endpoint '$ENDPOINT_NAME' until ready..."
          max_attempts=60
          sleep_seconds=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            status=$(databricks serving-endpoints get "$ENDPOINT_NAME" -o json | python3 -c "import sys, json; print(json.load(sys.stdin)['state']['config_update'])")
            echo "Attempt $attempt/$max_attempts -> config_update: $status"
            if [ "$status" = "NOT_UPDATING" ]; then echo "PRD endpoint ready."; break; fi
            if [ "$status" = "UPDATE_FAILED" ]; then echo "PRD update failed."; exit 1; fi
            attempt=$((attempt + 1)); sleep $sleep_seconds
          done

      - name: Install test dependencies
        run: |
          uv sync --extra test

      - name: Set endpoint environment variables (PRD)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail
          HOST="${DATABRICKS_HOST%/}"

          if [ -z "${DATABRICKS_TOKEN:-}" ]; then
            echo "DATABRICKS_TOKEN secret is empty. Add it to the 'prd' environment"
            echo "(Settings > Environments > prd > Add secret)."
            exit 1
          fi

          echo "::add-mask::$DATABRICKS_TOKEN"
          echo "ENDPOINT_URL=${HOST}/serving-endpoints/marvel-character-model-serving/invocations" >> $GITHUB_ENV
          echo "DBR_TOKEN=$DATABRICKS_TOKEN" >> $GITHUB_ENV
          echo "DBR_TOKEN set from secret (length: ${#DATABRICKS_TOKEN})."

      - name: Smoke tests against PROD (GATE)
        run: |
          uv run pytest tests/smoke/ -v --no-cov

      - name: Serving correctness against PROD
        run: |
          uv run pytest tests/ServingEndpoint/ -v --no-cov

      - name: Regression check against PROD
        run: |
          uv run pytest tests/regression/ -v --no-cov

      - name: Tag version (prd only)
        run: |
          echo "VERSION=$(cat version.txt)"
          git tag $VERSION
          git push origin $VERSION
